<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>家务积分系统</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      background: #f2f2f2;
      padding: 16px;
      max-width: 480px;
      margin: auto;
    }

    h2 {
      margin-top: 24px;
    }

    .score {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      user-select: none;
    }

    .card:active {
      transform: scale(0.97);
    }

    #log {
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 14px;
    }

    #log div {
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <div class="score">当前积分：<span id="score">0</span></div>

  <h2>📌 任务</h2>
  <div id="tasks" class="grid"></div>

  <h2>🎁 奖励</h2>
  <div id="rewards" class="grid"></div>

  <h2>📜 记录</h2>
  <div id="log"></div>

<script>
  const tasks = [
    { name: "清理1双鞋子", score: 10, count: 0 },
    { name: "按摩1次", score: 10, count: 0 },
    { name: "洗衣服1次", score: 10, count: 0 },
    { name: "准备早饭", score: 10, count: 0 },
    { name: "车夫1次", score: 10, count: 0 },
    { name: "打扫卫生1次", score: 10, count: 0 },
    { name: "脚垫1小时", score: 20, count: 0 },
    { name: "鞋架1小时", score: 20, count: 0 },
    { name: "除臭1小时", score: 20, count: 0 },
    { name: "坐垫1小时", score: 20, count: 0 },
    { name: "尿壶1次", score: 20, count: 0 },
    { name: "马桶1次", score: 50, count: 0 },
    { name: "锁1天", score: 50, count: 0 },
    { name: "口器侍寝1次", score: 50, count: 0 },
    { name: "贡金500元", score: 100, count: 0 }
  ];

  const rewards = [
    { name: "照片1张", need: 20 },
    { name: "舔脚10分钟", need: 50 },
    { name: "保养玉足1分钟", need: 50 },
    { name: "原味袜套", need: 100 },
    { name: "原味内内", need: 200 },
    { name: "开锁1次", need: 300 },
    { name: "释放1次", need: 500 },
    { name: "侍寝1次", need: 1000 }
  ];

  let totalScore = 0;

  const scoreEl = document.getElementById("score");
  const taskEl = document.getElementById("tasks");
  const rewardEl = document.getElementById("rewards");
  const logEl = document.getElementById("log");

  function save() {
    localStorage.setItem("score", totalScore);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    localStorage.setItem("log", logEl.innerHTML);
  }

  function load() {
    totalScore = Number(localStorage.getItem("score")) || 0;
    const savedTasks = localStorage.getItem("tasks");
    if (savedTasks) {
      JSON.parse(savedTasks).forEach((t, i) => tasks[i].count = t.count);
    }
    const savedLog = localStorage.getItem("log");
    if (savedLog) logEl.innerHTML = savedLog;
  }

  function logAction(text) {
    const time = new Date().toLocaleTimeString();
    const div = document.createElement("div");
    div.textContent = `[${time}] ${text}`;
    logEl.prepend(div);
  }

  function renderTasks() {
    taskEl.innerHTML = "";
    tasks.forEach(task => {
      const div = document.createElement("div");
      div.className = "card";
      div.textContent = task.count
        ? `${task.name} ×${task.count}（+${task.score}）`
        : `${task.name}（+${task.score}）`;
      div.onclick = () => {
        task.count++;
        totalScore += task.score;
        logAction(`完成任务：${task.name} ×${task.count}（+${task.score}）`);
        update();
      };
      taskEl.appendChild(div);
    });
  }

  function renderRewards() {
    rewardEl.innerHTML = "";
    rewards.forEach(r => {
      const div = document.createElement("div");
      div.className = "card";
      div.textContent = `${r.name}（-${r.need}）`;
      div.onclick = () => {
        if (totalScore < r.need) {
          alert("积分不足");
          return;
        }
        if (confirm(`确定兑换「${r.name}」？`)) {
          totalScore -= r.need;
          logAction(`兑换奖励：${r.name}（-${r.need}）`);
          update();
        }
      };
      rewardEl.appendChild(div);
    });
  }

  function update() {
    scoreEl.textContent = totalScore;
    renderTasks();
    renderRewards();
    save();
  }

  load();
  update();
</script>

</body>
</html>
